name: permission
timeout: 120

steps:
  - start:
      dog: Permit
      task: Write the exact text PERMISSION_RESUMED to /tmp/dogwalk-permission-probe.txt, read it back, delete the file, and report the text you read.
  - wait: Permit

assert:
  - permissions_at_least: 1
  - same: [Permit.session_state, ready]
  - same: [Permit.turn_state, stopped]
  - same: [Permit.stop_reason, end_turn]
  - contains:
      value: Permit.report
      text: PERMISSION_RESUMED
