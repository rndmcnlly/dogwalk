name: collaboration
timeout: 120

steps:
  - start:
      dog: Bard
      task: Write a short four-line poem about a dog walk to poem.txt.
  - wait: Bard
  - remember:
      bard_session: Bard.session.id
  - start:
      dog: Lingo
      task: Read poem.txt and translate the poem into Spanish in poem.es.txt.
  - wait: Lingo
  - rename:
      dog: Bard
      to: Poet
  - continue:
      dog: Poet
      message: Inspect the workspace and tell me what happened to your poem after you wrote it.
  - wait: Poet
  - timer:
      seconds: 1
      purpose: Verify timer delivery without a voice call.
      remember_as: fired_timer

assert:
  - file_exists: poem.txt
  - file_exists: poem.es.txt
  - same: [Poet.session.id, $bard_session]
  - different: [Poet.session.id, Lingo.session.id]
  - same: [Poet.session_state, ready]
  - same: [Poet.turn_state, stopped]
  - same: [Poet.stop_reason, end_turn]
  - same: [Poet.session.usage.cost.currency, USD]
  - turns:
      Poet: 2
      Lingo: 1
  - contains:
      value: Poet.start_message
      text: configured workspace
