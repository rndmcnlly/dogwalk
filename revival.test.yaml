name: revival
timeout: 120

steps:
  - start:
      dog: Scribe
      task: Remember the phrase "copper moon" for later. Do not write anything.
  - wait: Scribe
  - remember:
      old_session: Scribe.session.id
  - restart: {}
  - recall: {}
  - revive:
      dog: Echo
      session: $old_session
  - wait: Echo
  - continue:
      dog: Echo
      message: Write the phrase you remembered earlier, followed by a second line "silver trail", to memory.txt.
  - wait: Echo

assert:
  - file_exists: memory.txt
  - same: [Echo.session.id, $old_session]
  - same: [Echo.session_state, ready]
  - same: [Echo.turn_state, stopped]
  - same: [Echo.stop_reason, end_turn]
  - turns:
      Echo: 1
