name: followup
timeout: 90

steps:
  - start:
      dog: Echo
      task: Reply briefly that you are ready for a follow-up. Do not use tools or change files.
  - wait: Echo
  - remember:
      original_session: Echo.session.id
  - continue:
      dog: Echo
      message: Acknowledge the exact phrase visible follow-up. Do not use tools or change files.
  - wait: Echo

assert:
  - same: [Echo.session.id, $original_session]
  - turns:
      Echo: 2
  - contains:
      value: Echo.updates
      text: Acknowledge the exact phrase visible follow-up. Do not use tools or change files.
