name: interruption
timeout: 120

steps:
  - start:
      dog: Rover
      task: Run the command `sleep 30`, then write stale.txt containing the word stale.
  - stop:
      dog: Rover
      after_tool: true
  - wait: Rover
  - remember:
      original_session: Rover.session.id
      interrupted_reason: Rover.stop_reason
  - continue:
      dog: Rover
      message: Correct course now. Do not create stale.txt. Write corrected.txt containing corrected.
  - wait: Rover
  - call_off:
      dog: Rover
  - start:
      dog: Rover
      task: Write rebound.txt containing rebound.
  - wait: Rover
  - remember:
      rebound_session: Rover.session.id

assert:
  - file_exists: corrected.txt
  - file_exists: rebound.txt
  - different: [$original_session, $rebound_session]
  - same: [$interrupted_reason, cancelled]
  - same: [Rover.session_state, ready]
  - same: [Rover.turn_state, stopped]
